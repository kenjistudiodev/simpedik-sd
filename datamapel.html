<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>SIMPEDIK · Data Mata Pelajaran</title>
    <meta name="description" content="Data Mata Pelajaran — Sistem Informasi Pendidikan Sekolah.">

    <!-- Font Awesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (sama dengan tema dashboard admin) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">

    <!-- Supabase JS SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      /* ============================================================
         SIMPEDIK — Design tokens (disamakan dengan dashboard admin)
         Tema: kertas buku tulis sekolah (garis biru + margin merah)
         ============================================================ */
      :root{
        --paper:        #c29a4f;
        --paper-card:   #FFFEFB;
        --rule-blue:    #B8D0E8;
        --margin-red:   #C1503B;
        --margin-red-soft: #E7A99A;
        --ink:          #1C3357;
        --ink-soft:     #52658A;
        --ink-faint:    #8A99B8;
        --gold:         #E3A23C;
        --gold-deep:    #B87A22;
        --green-deep:   #20443A;
        --green-deep-2: #163229;
        --danger:       #C1503B;

        --font-display: 'Baloo 2', system-ui, sans-serif;
        --font-body:    'Plus Jakarta Sans', system-ui, sans-serif;
        --font-hand:    'Caveat', cursive;

        --radius-lg: 22px;
        --radius-md: 14px;
        --radius-sm: 9px;

        --shadow-card: 0 18px 40px -14px rgba(28,51,87,0.28), 0 2px 8px rgba(28,51,87,0.06);
        --shadow-soft: 0 8px 20px -10px rgba(28,51,87,0.22);

        --header-height: 64px;
        --primary-color: var(--gold-deep);
        --secondary-color: var(--margin-red);
    }

        *,*::before,*::after{ box-sizing:border-box; }
        html{ -webkit-text-size-adjust:100%; }
        * { margin: 0; padding: 0; }

        body {
            font-family: var(--font-body);
            color: var(--ink);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Mencegah scroll ganda pada body */
        }
        img{ max-width:100%; display:block; }
        a{ color:inherit; }

        @media (prefers-reduced-motion: reduce){
          *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
        }

        /* ---------- Background: kertas buku tulis ---------- */
        .notebook-bg{
          position:fixed;
          inset:0;
          z-index:-1;
          pointer-events:none;
          background-image:
            linear-gradient(180deg, rgba(251,247,239,0.92) 0%, rgba(251,247,239,0.86) 45%, rgba(251,247,239,0.94) 100%),
            url('assets/bg1.jpeg');
          background-size:cover;
          background-position:center;
          background-repeat:no-repeat;
          background-color: var(--paper);
          background-attachment:fixed;
        }
        .notebook-bg::before{
          content:"";
          position:absolute;
          top:0; bottom:0;
          left:clamp(28px, 8vw, 96px);
          width:2px;
          background:var(--margin-red-soft);
          opacity:0.5;
        }
        @media (max-width:768px), (hover:none){
          .notebook-bg{ background-attachment:scroll; }
          .notebook-bg::before{ left:22px; }
        }

        /* --- Navbar --- */
        .navbar {
            height: var(--header-height);
            background-color: var(--paper-card);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 0 clamp(14px, 3vw, 28px);
            box-shadow: var(--shadow-soft);
            border-bottom: 4px solid var(--gold);
            z-index: 2500;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--ink);
            min-width: 0;
        }

        .navbar-brand .logo-badge{
            width:38px;
            height:38px;
            border-radius:50%;
            background:var(--green-deep);
            display:flex;
            align-items:center;
            justify-content:center;
            flex-shrink:0;
            overflow:hidden;
            box-shadow:var(--shadow-soft);
            border:2px solid #fff;
        }
        .navbar-brand .logo-badge img{
            width:100%; height:100%; object-fit:contain;
        }

        .navbar-brand span {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Navbar Dashboard Button --- */
        .navbar-dashboard-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--green-deep), var(--green-deep-2));
            color: #fff;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 8px 18px -8px rgba(32,68,58,.6);
            transition: transform .12s ease, filter .15s ease;
            flex-shrink: 0;
        }
        .navbar-dashboard-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }

        /* --- Main Content --- */
        .main-content {
            margin-top: var(--header-height);
            margin-left: 0; /* Default: Full width */
            padding: clamp(16px, 3vw, 28px);
            flex: 1;
            overflow-y: auto;
            position: relative;
            z-index: 1;
            transition: margin-left 0.3s ease;
        }

        .dashboard-card {
            background: var(--paper-card);
            padding: 22px clamp(18px, 3vw, 26px) 24px;
            border-radius: 4px var(--radius-lg) var(--radius-lg) var(--radius-lg);
            box-shadow: var(--shadow-card);
            border-top: 5px solid var(--gold);
            margin-bottom: 20px;
            overflow: visible;
        }

        .dashboard-card h2{
            font-family: var(--font-display);
            color: var(--ink);
            font-size: 1.4rem;
        }

        /* Tables */
        .table-responsive { overflow-x: auto; }
        .custom-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .custom-table th, .custom-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #EFE7D6; }
        .custom-table th { background-color: #FBF6EC; color: var(--ink-soft); font-weight: 700; }
        .custom-table tr:hover { background-color: #FBF6EC; }
        
        /* Buttons */
        .btn { padding: 8px 15px; border: none; border-radius: 999px; cursor: pointer; font-family: var(--font-display); font-weight: 700; font-size: 0.9rem; color: white; display: inline-flex; align-items: center; gap: 5px; text-decoration: none; transition: transform .12s ease, filter .15s ease; }
        .btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
        .btn-primary { background: linear-gradient(135deg, var(--gold-deep), var(--margin-red)); box-shadow: 0 8px 18px -8px rgba(184,122,34,.6); }
        .btn-danger { background: linear-gradient(135deg, var(--margin-red), #8f3a2a); box-shadow: 0 8px 18px -8px rgba(193,80,59,.6); }
        .btn-warning { background: linear-gradient(135deg, var(--gold), var(--gold-deep)); color: #3a2600; box-shadow: 0 8px 18px -8px rgba(227,162,60,.6); }
        .btn-secondary { background-color: #EFE7D6; color: var(--ink); box-shadow: none; }
        .btn-secondary:hover { background-color: #E5DAC2; }

        /* Footer */
        .main-footer {
            text-align: center;
            padding: 20px;
            color: var(--ink-faint);
            font-size: 0.85rem;
            margin-top: 6px;
        }
        .main-footer .tagline{
            font-family: var(--font-hand);
            font-size: 1.35rem;
            color: var(--gold-deep);
            font-weight: 700;
            margin: 0 0 4px;
        }
        .main-footer p{ margin: 2px 0; }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(28,51,87,0.55); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background-color: var(--paper-card); padding: 25px; border-radius: 4px var(--radius-lg) var(--radius-lg) var(--radius-lg); width: 90%; max-width: 500px; box-shadow: var(--shadow-card); border-top: 5px solid var(--gold); animation: fadeIn 0.3s; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px dashed var(--rule-blue); padding-bottom: 10px; }
        .modal-header h3 { font-family: var(--font-display); color: var(--ink); font-size: 1.2rem; margin: 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--ink-soft); font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #FBF6EC; border: 1px solid #EFE7D6; border-radius: 6px; color: var(--ink); font-size: 0.95rem; transition: border-color 0.3s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--gold-deep); }
        .form-group input[readonly] { background-color: #F0EAD9; cursor: not-allowed; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .close-modal { font-size: 1.5rem; cursor: pointer; color: var(--ink-faint); transition: color 0.2s; }
        .close-modal:hover { color: var(--margin-red); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .navbar-brand span {
                font-size: 0.92rem; /* Sedikit lebih kecil di HP */
                max-width: 38vw;
            }

            .navbar-dashboard-btn span { display: none; }
            .navbar-dashboard-btn { padding: 10px 14px; }

            .main-content {
                padding: 18px 10px;
            }

            .dashboard-card {
                padding: 16px;
            }

            .modal-content {
                width: calc(100% - 10px);
                margin: 0 5px;
                padding: 15px;
            }

            .modal-footer {
                flex-wrap: wrap;
            }

            .modal-footer .btn {
                flex: 1 1 auto;
                justify-content: center;
            }

            .mapel-toolbar #btnTambahMapel,
            .mapel-search {
                width: 100%;
            }

            .mapel-search input {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="notebook-bg" aria-hidden="true"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="dahsboardadmin.html" class="navbar-brand">
            <span class="logo-badge">
                <img src="" alt="Logo Sekolah" style="display: none;">
            </span>
            <span></span>
        </a>
        <a href="dahsboardadmin.html" class="navbar-dashboard-btn">
            <i class="fas fa-th-large"></i> <span>Dashboard</span>
        </a>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        <div class="dashboard-card">
            <h2>Data Mata Pelajaran</h2>
            <p style="color: var(--ink-soft); margin-top: 10px;">Kelola data mata pelajaran sekolah di sini.</p>
        </div>
        
        <!-- Container Tabel Data Mapel -->
        <div class="dashboard-card">
            <div class="mapel-toolbar" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                <button class="btn btn-primary" id="btnTambahMapel"><i class="fas fa-plus"></i> Tambah Mapel</button>
                <div class="mapel-search" style="display: flex; gap: 10px;">
                    <input type="text" placeholder="Cari Mapel..." style="padding: 8px; border: 1px solid #EFE7D6; border-radius: 6px; background: #FBF6EC; color: var(--ink);">
                </div>
            </div>

            <div class="table-responsive">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>Id Mapel</th>
                            <th>Kode Mapel</th>
                            <th>Nama Mapel</th>
                            <th>Guru Pengajar</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 20px; color: var(--ink-faint);">Belum ada data mata pelajaran.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Footer -->
        <footer class="main-footer">
            <p class="tagline">Cerdas, Kreatif, Berkarakter</p>
            <p>&copy; 2026 SMKN 1 SIMPANG TERITIP.</p>
            <p>CopyRight Kenji Studio Developer.</p>
        </footer>
    </main>

    <!-- Modal Tambah Mapel -->
    <div id="modalMapel" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Tambah Mata Pelajaran</h3>
                <span class="close-modal" onclick="toggleModal('modalMapel')">&times;</span>
            </div>
            <form id="formMapel">
                <div class="form-group">
                    <label for="idMapel">Id</label>
                    <input type="text" id="idMapel" readonly placeholder="Otomatis terisi (IDM-...)">
                </div>
                <div class="form-group">
                    <label for="kodeMapel">Kode Mapel</label>
                    <input type="text" id="kodeMapel" required placeholder="Contoh: MTK">
                </div>
                <div class="form-group">
                    <label for="namaMapel">Nama Mapel</label>
                    <input type="text" id="namaMapel" required placeholder="Contoh: Matematika">
                </div>
                <div class="form-group">
                    <label for="guruMapel">Guru Yang Mengajar</label>
                    <select id="guruMapel" required><option value="">Pilih Guru</option></select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="toggleModal('modalMapel')">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- Supabase Integration for Navbar ---
        const supabaseUrl = 'https://ovaekdszrtrqyfxubjzw.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92YWVrZHN6cnRycXlmeHVianp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNDk1MjAsImV4cCI6MjA5OTcyNTUyMH0.UBbE3tgpaVLHWoZX7h30KlrLSOVHTheZw7xvMLOrD_E';
        
        // --- Supabase Integration for Absensi (Mata Pelajaran) ---
        const absensiUrl = 'https://ovaekdszrtrqyfxubjzw.supabase.co';
        const absensiKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92YWVrZHN6cnRycXlmeHVianp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNDk1MjAsImV4cCI6MjA5OTcyNTUyMH0.UBbE3tgpaVLHWoZX7h30KlrLSOVHTheZw7xvMLOrD_E';
        
        if (typeof supabase !== 'undefined') {
            const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
            const absensiClient = supabase.createClient(absensiUrl, absensiKey);

            async function loadSchoolIdentity() {
                try {
                    const { data, error } = await supabaseClient
                        .from('identitassekolah')
                        .select('nama_sekolah, logo')
                        .limit(1)
                        .single();
                    
                    if (data) {
                        if (data.nama_sekolah) {
                            document.querySelector('.navbar-brand span:last-child').textContent = data.nama_sekolah;
                        }
                        if (data.logo) {
                            const img = document.querySelector('.navbar-brand .logo-badge img');
                            img.src = data.logo;
                            img.style.display = 'block';
                        }
                    }
                } catch (err) {
                    console.error("Error loading school identity:", err);
                }
            }
            document.addEventListener('DOMContentLoaded', loadSchoolIdentity);
            document.addEventListener('DOMContentLoaded', loadMapelData);
            document.addEventListener('DOMContentLoaded', loadGuruOptions);

            // --- Load Data Mapel ---
            async function loadMapelData() {
                const tableBody = document.querySelector('.custom-table tbody');
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Memuat data...</td></tr>';

                const { data, error } = await absensiClient
                    .from('matapelajaran')
                    .select('*')
                    .order('nama_mapel', { ascending: true });

                if (error) {
                    console.error(error);
                    tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">Gagal memuat data: ${error.message}</td></tr>`;
                    return;
                }

                tableBody.innerHTML = '';
                if (!data || data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Belum ada data mata pelajaran.</td></tr>';
                    return;
                }

                data.forEach((item, index) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${item.id}</td>
                        <td>${item.kode_mapel}</td>
                        <td>${item.nama_mapel}</td>
                        <td>${item.nama_guru || '-'}</td>
                        <td>
                            <button onclick="editMapel('${item.id}')" style="background:none; border:none; color:var(--gold-deep); cursor:pointer; margin-right:10px; font-size:1rem;" title="Edit"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteMapel('${item.id}')" style="background:none; border:none; color:var(--margin-red); cursor:pointer; font-size:1rem;" title="Hapus"><i class="fas fa-trash"></i></button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            }
            
            // --- Load Data Guru for Dropdown ---
            async function loadGuruOptions() {
                const select = document.getElementById('guruMapel');
                const { data, error } = await supabaseClient
                    .from('dataguru')
                    .select('nama_guru')
                    .order('nama_guru');
                
                if (data) {
                    select.innerHTML = '<option value="">Pilih Guru</option>';
                    data.forEach(guru => {
                        const option = document.createElement('option');
                        option.value = guru.nama_guru;
                        option.textContent = guru.nama_guru;
                        select.appendChild(option);
                    });
                }
            }

            // --- Save Data Mapel ---
            document.getElementById('formMapel').addEventListener('submit', async (e) => {
                e.preventDefault();
                const id = document.getElementById('idMapel').value;
                const kode = document.getElementById('kodeMapel').value;
                const nama = document.getElementById('namaMapel').value;
                const guru = document.getElementById('guruMapel').value;
                const submitBtn = e.target.querySelector('button[type="submit"]');
                
                submitBtn.textContent = 'Menyimpan...';
                submitBtn.disabled = true;

                const { error } = await absensiClient
                    .from('matapelajaran')
                    .upsert({ id: id, kode_mapel: kode, nama_mapel: nama, nama_guru: guru });

                submitBtn.textContent = 'Simpan';
                submitBtn.disabled = false;

                if (error) {
                    alert('Gagal menyimpan: ' + error.message);
                } else {
                    alert('Data berhasil disimpan!');
                    toggleModal('modalMapel');
                    document.getElementById('formMapel').reset();
                    loadMapelData();
                }
            });

            // --- Delete Data Mapel ---
            window.deleteMapel = async (id) => {
                if(confirm('Hapus mata pelajaran ini?')) {
                    const { error } = await absensiClient.from('matapelajaran').delete().eq('id', id);
                    if(error) alert('Gagal hapus: ' + error.message);
                    else loadMapelData();
                }
            };

            // --- Edit Data Mapel ---
            window.editMapel = async (id) => {
                const { data, error } = await absensiClient.from('matapelajaran').select('*').eq('id', id).single();
                if(data) {
                    document.getElementById('idMapel').value = data.id;
                    document.getElementById('kodeMapel').value = data.kode_mapel;
                    document.getElementById('namaMapel').value = data.nama_mapel;
                    document.getElementById('guruMapel').value = data.nama_guru || '';
                    document.getElementById('modalMapel').classList.add('active');
                }
            };
        }

        // --- Modal Logic ---
        const btnTambahMapel = document.getElementById('btnTambahMapel');
        const modalMapel = document.getElementById('modalMapel');
        const inputKode = document.getElementById('kodeMapel');
        const inputId = document.getElementById('idMapel');

        function toggleModal(modalId) {
            document.getElementById(modalId).classList.toggle('active');
        }

        btnTambahMapel.addEventListener('click', () => toggleModal('modalMapel'));

        // Auto-fill ID Logic
        inputKode.addEventListener('input', function() {
            inputId.value = 'IDM-' + this.value.toUpperCase();
        });
    </script>
</body>
</html>
