<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SIMPEDIK-SD · Masuk ke Akun</title>
<meta name="description" content="Sistem Informasi Pendidikan Sekolah Dasar — masuk sebagai Siswa, Guru, Tata Usaha, atau Admin Utama.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     SIMPEDIK-SD — Design tokens
     Tema: kertas buku tulis sekolah (garis biru + margin merah)
     dipadukan dengan kartu pelajar untuk area login.
     ============================================================ */
  :root{
    --paper:        #c29a4f;
    --paper-card:   #FFFEFB;
    --rule-blue:    #B8D0E8;
    --margin-red:   #C1503B;
    --margin-red-soft: #E7A99A;
    --ink:          #1C3357;
    --ink-soft:     #52658A;
    --ink-faint:    #8A99B8;
    --gold:         #E3A23C;
    --gold-deep:    #B87A22;
    --green-deep:   #20443A;
    --green-deep-2: #163229;
    --danger:       #C1503B;

    --font-display: 'Baloo 2', system-ui, sans-serif;
    --font-body:    'Plus Jakarta Sans', system-ui, sans-serif;
    --font-hand:    'Caveat', cursive;

    --radius-lg: 22px;
    --radius-md: 14px;
    --radius-sm: 9px;

    --shadow-card: 0 18px 40px -14px rgba(28,51,87,0.28), 0 2px 8px rgba(28,51,87,0.06);
    --shadow-soft: 0 8px 20px -10px rgba(28,51,87,0.22);

    --focus-ring: 3px solid #E3A23C;
  }

  *,*::before,*::after{ box-sizing:border-box; }
  html{ -webkit-text-size-adjust:100%; }
  body{
    margin:0;
    min-height:100svh;
    font-family:var(--font-body);
    color:var(--ink);
    background:var(--paper);
    -webkit-font-smoothing:antialiased;
  }
  img{ max-width:100%; display:block; }
  button{ font-family:inherit; }
  a{ color:inherit; }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
  }

  /* ---------- Background halaman: foto bg1.jpg + overlay kertas ---------- */
  .notebook-bg{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    background-image:
      /* overlay warna kertas transparan supaya teks & kartu tetap terbaca */
      linear-gradient(180deg, rgba(251,247,239,0.90) 0%, rgba(251,247,239,0.80) 45%, rgba(251,247,239,0.92) 100%),
      url('bg1.jpeg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
  }
  .notebook-bg::before{
    /* garis margin merah ala buku tulis, tetap dipertahankan sebagai aksen */
    content:"";
    position:absolute;
    top:0; bottom:0;
    left:clamp(28px, 8vw, 96px);
    width:2px;
    background:var(--margin-red-soft);
    opacity:0.65;
  }
  @media (max-width:600px){
    .notebook-bg::before{ left:22px; }
  }
  /* Safari/iOS: background-attachment: fixed dapat lambat/bermasalah di scroll,
     jadi dinonaktifkan pada layar sentuh kecil */
  @media (max-width:768px), (hover:none){
    .notebook-bg{ background-attachment:scroll; }
  }

  /* ---------- Page shell ---------- */
  .page{
    position:relative;
    z-index:1;
    min-height:100svh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:clamp(28px, 5vw, 44px);
    padding: clamp(24px, 6vw, 56px) clamp(18px, 8vw, 40px) clamp(28px, 5vw, 48px);
  }

  /* ---------- Brand header ---------- */
  .brand{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:14px;
    max-width:560px;
  }
  .brand__logos{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:clamp(10px, 3vw, 18px);
  }
  .logo-badge{
    width:clamp(56px, 10vw, 76px);
    height:clamp(56px, 10vw, 76px);
    border-radius:50%;
    background:var(--paper-card);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:var(--shadow-soft);
    border:2px solid #fff;
    overflow:hidden;
    flex-shrink:0;
  }
  .logo-badge--app{ background:var(--green-deep); }
  .logo-badge img{ width:70%; height:70%; object-fit:contain; }
  .logo-badge__fallback{
    font-family:var(--font-display);
    font-weight:700;
    font-size:clamp(0.65rem, 2vw, 0.8rem);
    letter-spacing:0.02em;
    text-align:center;
    line-height:1.15;
    padding:4px;
  }
  .logo-badge--app .logo-badge__fallback{ color:#fff; }
  .logo-badge--school .logo-badge__fallback{ color:var(--ink-soft); }

  .brand__divider{
    font-family:var(--font-display);
    font-size:clamp(1.1rem, 2.6vw, 1.4rem);
    color:var(--gold-deep);
    font-weight:700;
  }

  .brand__title{
    margin:6px 0 0;
    font-family:var(--font-display);
    font-weight:800;
    letter-spacing:0.01em;
    font-size:clamp(1.7rem, 5vw, 2.6rem);
    color:var(--ink);
  }
  .brand__title span{ color:var(--margin-red); }

  .brand__subtitle{
    margin:0;
    font-size:clamp(0.85rem, 2vw, 0.98rem);
    color:var(--ink-soft);
    font-weight:500;
  }

  /* ---------- Auth section ---------- */
  .auth{
    width:100%;
    max-width:440px;
    display:flex;
    flex-direction:column;
    align-items:stretch;
  }

  /* Role tabs — styled like folder / rapor dividers */
  .role-tabs{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:6px;
    padding:0 6px;
  }
  .role-tab{
    appearance:none;
    border:none;
    background:#EFE7D6;
    color:var(--ink-soft);
    border-radius:12px 12px 0 0;
    padding:11px 4px 13px;
    font-family:var(--font-body);
    font-weight:600;
    font-size:clamp(0.68rem, 2.4vw, 0.78rem);
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    transition:background .18s ease, color .18s ease, transform .18s ease;
    position:relative;
    top:2px;
  }
  .role-tab svg{ width:18px; height:18px; opacity:0.75; transition:opacity .18s ease; }
  .role-tab:hover{ background:#F5EEDF; color:var(--ink); }
  .role-tab:focus-visible{ outline:var(--focus-ring); outline-offset:2px; z-index:2; }
  .role-tab.is-active{
    background:var(--paper-card);
    color:var(--margin-red);
    box-shadow:0 -2px 10px rgba(28,51,87,0.08);
    transform:translateY(-2px);
  }
  .role-tab.is-active svg{ opacity:1; }

  /* ID-card styled login container */
  .id-card{
    position:relative;
    background:var(--paper-card);
    border-radius:4px var(--radius-lg) var(--radius-lg) var(--radius-lg);
    box-shadow:var(--shadow-card);
    padding:clamp(28px, 5vw, 38px) clamp(22px, 5vw, 32px) clamp(26px, 5vw, 34px);
    border-top:5px solid var(--gold);
  }
  .id-card__punch{
    position:absolute;
    top:-11px;
    left:50%;
    transform:translateX(-50%);
    width:26px;
    height:26px;
    border-radius:50%;
    background:var(--paper);
    box-shadow:inset 0 2px 4px rgba(28,51,87,0.25), 0 1px 0 rgba(255,255,255,0.6);
    border:3px solid var(--paper-card);
  }

  .login-form__role-note{
    margin:0 0 20px;
    text-align:center;
    font-size:0.92rem;
    color:var(--ink-soft);
  }
  .login-form__role-note strong{ color:var(--margin-red); font-weight:700; }

  .field{ margin-bottom:16px; }
  .field label{
    display:block;
    font-size:0.8rem;
    font-weight:700;
    letter-spacing:0.01em;
    color:var(--ink);
    margin-bottom:6px;
  }
  .field input[type="text"],
  .field input[type="password"]{
    width:100%;
    font-family:var(--font-body);
    font-size:0.98rem;
    padding:12px 14px;
    border-radius:var(--radius-sm);
    border:1.5px solid #DCE3EE;
    background:#FCFBF8;
    color:var(--ink);
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .field input::placeholder{ color:var(--ink-faint); }
  .field input:focus-visible{
    border-color:var(--gold);
    box-shadow:0 0 0 4px rgba(227,162,60,0.22);
  }

  .field__password{ position:relative; }
  .field__password input{ padding-right:44px; }
  .toggle-password{
    position:absolute;
    right:6px;
    top:50%;
    transform:translateY(-50%);
    width:34px;
    height:34px;
    border:none;
    background:transparent;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .toggle-password:hover{ background:#EFEAE0; color:var(--ink); }
  .toggle-password:focus-visible{ outline:var(--focus-ring); outline-offset:1px; }
  .toggle-password svg{ width:19px; height:19px; }

  .field--row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:22px;
    flex-wrap:wrap;
    gap:8px;
  }
  .checkbox{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.85rem;
    color:var(--ink-soft);
    cursor:pointer;
    user-select:none;
  }
  .checkbox input{
    width:17px; height:17px;
    accent-color:var(--margin-red);
    cursor:pointer;
  }
  .link-muted{
    font-size:0.85rem;
    color:var(--ink-soft);
    text-decoration:none;
    border-bottom:1px dashed var(--ink-faint);
  }
  .link-muted:hover{ color:var(--margin-red); border-color:var(--margin-red); }
  .link-muted:focus-visible{ outline:var(--focus-ring); outline-offset:3px; }

  .btn-submit{
    width:100%;
    appearance:none;
    border:none;
    border-radius:999px;
    padding:14px 18px;
    background:var(--green-deep);
    color:#fff;
    font-family:var(--font-display);
    font-weight:700;
    font-size:1rem;
    letter-spacing:0.01em;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    box-shadow:0 10px 22px -8px rgba(32,68,58,0.55);
    transition:background .16s ease, transform .12s ease, box-shadow .16s ease;
  }
  .btn-submit span{ font-family:var(--font-body); font-weight:600; font-size:0.9rem; opacity:0.85; }
  .btn-submit:hover{ background:var(--green-deep-2); transform:translateY(-1px); box-shadow:0 14px 26px -8px rgba(32,68,58,0.6); }
  .btn-submit:active{ transform:translateY(0); }
  .btn-submit:focus-visible{ outline:var(--focus-ring); outline-offset:3px; }

  .form-alert{
    margin:0 0 16px;
    padding:10px 13px;
    border-radius:var(--radius-sm);
    background:#FBEAE6;
    color:var(--danger);
    font-size:0.83rem;
    font-weight:600;
    display:none;
  }
  .form-alert.is-visible{ display:block; }

  /* ---------- Footer ---------- */
  .page-footer{
    text-align:center;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .page-footer__tagline{
    margin:0;
    font-family:var(--font-hand);
    font-size:clamp(1.2rem, 3vw, 1.5rem);
    color:var(--gold-deep);
    font-weight:700;
  }
  .page-footer__copy{
    margin:0;
    font-size:0.76rem;
    color:var(--ink-faint);
  }

  /* ---------- Breakpoints ---------- */

  /* Tablet */
  @media (max-width:768px){
    .role-tabs{ gap:4px; }
    .role-tab{ padding:10px 3px 11px; }
  }

  /* Mobile */
  @media (max-width:480px){
    .role-tabs{
      grid-template-columns:repeat(2, 1fr);
      gap:8px;
    }
    .role-tab{
      border-radius:12px;
      top:0;
      background:#EFE7D6;
    }
    .role-tab.is-active{ transform:none; box-shadow:var(--shadow-soft); }
    .id-card{ border-radius:18px; }
    .id-card__punch{ display:none; }
    .field--row{ flex-direction:row; }
  }

  @media (max-width:360px){
    .brand__title{ font-size:1.5rem; }
    .id-card{ padding:24px 16px 26px; }
  }

  /* Larger desktop: slightly roomier card */
  @media (min-width:1024px){
    .auth{ max-width:460px; }
  }
</style>
</head>
<body>

  <div class="notebook-bg" aria-hidden="true"></div>

  <main class="page">

    <!-- ============ Brand header: logo aplikasi + logo sekolah ============ -->
    <header class="brand">
      <div class="brand__logos">
        <div class="logo-badge logo-badge--app">
          <img src="logosimpedik.png" alt="Logo SIMPEDIK-SD"
               onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'logo-badge__fallback',textContent:'SIMPEDIK'}))">
        </div>
        <span class="brand__divider" aria-hidden="true">&times;</span>
        <div class="logo-badge logo-badge--school">
          <img src="logosekolah.png" alt="Logo Sekolah"
               onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'logo-badge__fallback',textContent:'LOGO SEKOLAH'}))">
        </div>
      </div>
      <h1 class="brand__title">SIMPEDIK<span>-SD</span></h1>
      <p class="brand__subtitle">Sistem Informasi Pendidikan Sekolah Dasar</p>
    </header>

    <!-- ============ Auth: role tabs + kartu login ============ -->
    <section class="auth" aria-label="Formulir masuk SIMPEDIK-SD">

      <div class="role-tabs" role="tablist" aria-label="Pilih peran pengguna">
        <button type="button" class="role-tab is-active" data-role="siswa" data-id-label="NIS" data-id-placeholder="Masukkan NIS" role="tab" aria-selected="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1.5 2.7 3 6 3s6-1.5 6-3v-5"/></svg>
          Siswa
        </button>
        <button type="button" class="role-tab" data-role="guru" data-id-label="NIP" data-id-placeholder="Masukkan NIP" role="tab" aria-selected="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg>
          Guru
        </button>
        <button type="button" class="role-tab" data-role="tu" data-id-label="NIP / Username" data-id-placeholder="Masukkan NIP atau username" role="tab" aria-selected="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h3.5l1.5 2H19a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"/></svg>
          Tata Usaha
        </button>
        <button type="button" class="role-tab" data-role="admin" data-id-label="Username" data-id-placeholder="Masukkan username" role="tab" aria-selected="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.4 8.7 8 11 4.6-2.3 8-6 8-11V5l-8-3Z"/><path d="m9.5 12 1.8 1.8L15 10"/></svg>
          Admin Utama
        </button>
      </div>

      <div class="id-card">
        <div class="id-card__punch" aria-hidden="true"></div>

        <form id="loginForm" class="login-form" novalidate>
          <p class="login-form__role-note">Masuk sebagai <strong id="roleLabel">Siswa</strong></p>

          <p class="form-alert" id="formAlert" role="alert">Mohon lengkapi semua kolom sebelum masuk.</p>

          <div class="field">
            <label for="username" id="usernameFieldLabel">NIS</label>
            <input type="text" id="username" name="username" autocomplete="username" placeholder="Masukkan NIS" required>
          </div>

          <div class="field">
            <label for="password">Kata Sandi</label>
            <div class="field__password">
              <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Masukkan kata sandi" required>
              <button type="button" class="toggle-password" id="togglePassword" aria-label="Tampilkan kata sandi" aria-pressed="false">
                <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="field field--row">
            <label class="checkbox">
              <input type="checkbox" id="remember" name="remember">
              <span>Ingat saya</span>
            </label>
            <a href="#" class="link-muted">Lupa kata sandi?</a>
          </div>

          <button type="submit" class="btn-submit">
            Masuk <span id="roleBtnLabel">sebagai Siswa</span>
          </button>
        </form>
      </div>
    </section>

    <footer class="page-footer">
      <p class="page-footer__tagline">Cerdas, Kreatif, Berkarakter</p>
      <p class="page-footer__copy">&copy; <span id="year"></span> SIMPEDIK-SD · Seluruh hak cipta dilindungi</p>
    </footer>

  </main>

  <script>
    // ---------- Tahun berjalan ----------
    document.getElementById('year').textContent = new Date().getFullYear();

    // ---------- Peran / role switcher ----------
    var roleNames = { siswa: 'Siswa', guru: 'Guru', tu: 'Tata Usaha', admin: 'Admin Utama' };
    var tabs = document.querySelectorAll('.role-tab');
    var roleLabel = document.getElementById('roleLabel');
    var roleBtnLabel = document.getElementById('roleBtnLabel');
    var usernameFieldLabel = document.getElementById('usernameFieldLabel');
    var usernameInput = document.getElementById('username');
    var currentRole = 'siswa';

    tabs.forEach(function (tab) {
      tab.addEventListener('click', function () {
        tabs.forEach(function (t) {
          t.classList.remove('is-active');
          t.setAttribute('aria-selected', 'false');
        });
        tab.classList.add('is-active');
        tab.setAttribute('aria-selected', 'true');

        currentRole = tab.getAttribute('data-role');
        var idLabel = tab.getAttribute('data-id-label');
        var idPlaceholder = tab.getAttribute('data-id-placeholder');

        roleLabel.textContent = roleNames[currentRole];
        roleBtnLabel.textContent = 'sebagai ' + roleNames[currentRole];
        usernameFieldLabel.textContent = idLabel;
        usernameInput.placeholder = idPlaceholder;
        usernameInput.value = '';
        document.getElementById('formAlert').classList.remove('is-visible');
      });
    });

    // ---------- Tampilkan / sembunyikan kata sandi ----------
    var toggleBtn = document.getElementById('togglePassword');
    var passwordInput = document.getElementById('password');
    var eyeIcon = document.getElementById('eyeIcon');
    var eyeOpen = '<path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z"/><circle cx="12" cy="12" r="3"/>';
    var eyeClosed = '<path d="M3 3l18 18"/><path d="M10.6 5.1A10.6 10.6 0 0 1 12 5c7 0 10.5 7 10.5 7a13.8 13.8 0 0 1-3.1 4.1M6.3 6.9C3.4 8.8 1.5 12 1.5 12s3.5 7 10.5 7c1.4 0 2.7-.28 3.8-.75"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/>';

    toggleBtn.addEventListener('click', function () {
      var isHidden = passwordInput.type === 'password';
      passwordInput.type = isHidden ? 'text' : 'password';
      toggleBtn.setAttribute('aria-pressed', String(isHidden));
      toggleBtn.setAttribute('aria-label', isHidden ? 'Sembunyikan kata sandi' : 'Tampilkan kata sandi');
      eyeIcon.innerHTML = isHidden ? eyeClosed : eyeOpen;
    });

    // ---------- Submit form ----------
    // Titik integrasi: ganti blok ini dengan pemanggilan API/backend Anda.
    var form = document.getElementById('loginForm');
    var formAlert = document.getElementById('formAlert');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var username = usernameInput.value.trim();
      var password = passwordInput.value.trim();

      if (!username || !password) {
        formAlert.textContent = 'Mohon lengkapi semua kolom sebelum masuk.';
        formAlert.classList.add('is-visible');
        return;
      }

      formAlert.classList.remove('is-visible');

      // TODO: kirim { role: currentRole, username, password } ke endpoint autentikasi.
      console.log('Percobaan masuk:', { role: currentRole, username: username });
    });
  </script>

</body>
</html>
